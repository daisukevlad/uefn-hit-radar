name: daily-collect
on:
  schedule:
    - cron: '5 22 * * *'   # 日本時間 毎朝 07:05
  workflow_dispatch:        # 手動実行も可能

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: データ収集
        run: node collect-once.mjs
      - name: 結果をコミット
        run: |
          git config user.name "hit-radar-bot"
          git config user.email "hit-radar-bot@users.noreply.github.com"
          git add data
          git commit -m "daily data $(date -u +%F)" || echo "no changes"
          # 手動実行と定期実行が競合してもpushが失敗しないようrebase+リトライ
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main || true
            if git push; then break; fi
            echo "push retry $i"; sleep 5
          done
      - name: オンライン閲覧用の静的サイトを生成
        run: node build-static.mjs
      - name: GitHub Pagesを構成
        uses: actions/configure-pages@v5
      - name: サイトをアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: 公開
        uses: actions/deploy-pages@v4
