name: daily-collect
on:
  schedule:
    - cron: '5 22 * * *'   # 日本時間 毎朝 07:05
  workflow_dispatch:        # 手動実行も可能

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: データ収集
        run: node collect-once.mjs
      - name: 結果をコミット
        run: |
          git config user.name "hit-radar-bot"
          git config user.email "hit-radar-bot@users.noreply.github.com"
          git add data
          git commit -m "daily data $(date -u +%F)" || echo "no changes"
          git push
