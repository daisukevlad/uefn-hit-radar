<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SNS投稿用スクショ - UEFNヒットレーダー</title>
  <style>
    :root {
      /* このページだけSNS投稿向けの明るい配色(他ページのダークテーマとは独立) */
      --bg: #fdf4ff; --panel: #ffffff; --panel2: #f7f5fb; --line: #e8e4f3;
      --text: #241f33; --dim: #767089; --accent: #ec4899; --accent2: #f97316; --accent3: #7c3aed;
      --good: #16a34a; --bad: #e11d48; --blue: #7c3aed;
      --grad: linear-gradient(120deg, #7c3aed 0%, #ec4899 55%, #f97316 100%);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(160deg, #fff3ec 0%, #fdf2f8 45%, #eff2ff 100%);
      background-attachment: fixed;
      color: var(--text);
      font-family: "Segoe UI","Hiragino Sans","Meiryo",sans-serif;
      font-size: 14px;
    }

    .wrapper {
      max-width: 1320px;
      margin: 0 auto;
      padding: 20px;
    }

    /* 選択(左)とプレビュー(右)を横並びにして1画面で完結させる */
    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 400px) 1fr;
      gap: 24px;
      align-items: start;
    }

    .layout-right {
      position: sticky;
      top: 20px;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .layout-right {
        position: static;
      }
    }

    .screenshot-mode .layout {
      grid-template-columns: 1fr;
    }
    .screenshot-mode .layout-left {
      display: none;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: var(--accent3);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }
    .back-link:hover {
      text-decoration: underline;
    }

    h1 {
      font-size: 26px;
      margin: 0 0 10px 0;
      color: var(--text);
    }
    h1 .accent {
      background: var(--grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: var(--accent);
    }

    .subtitle {
      font-size: 13px;
      color: var(--dim);
      margin-bottom: 20px;
    }

    .controls-section {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    button {
      background: var(--grad);
      color: #fff;
      border: 0;
      border-radius: 999px;
      padding: 11px 20px;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
      box-shadow: 0 6px 16px rgba(124, 58, 237, 0.25);
      transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    }
    button:hover {
      opacity: 0.95;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(124, 58, 237, 0.32);
    }

    #editBtn {
      background: #fff;
      color: var(--accent3);
      border: 2px solid var(--accent3);
      box-shadow: none;
    }

    .manual-add {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .manual-add input {
      flex: 1;
      min-width: 200px;
      background: var(--panel);
      border: 1.5px solid var(--line);
      color: var(--text);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
    }
    .manual-add input::placeholder {
      color: var(--dim);
    }
    .manual-add input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .checklist-section {
      display: block;
    }

    .genre-group {
      margin-bottom: 20px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 10px rgba(124, 58, 237, 0.05);
    }

    .genre-heading {
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 12px 0;
      border-left: 4px solid var(--accent);
      padding-left: 10px;
      color: var(--accent3);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
    }
    .checkbox-row:last-child {
      border-bottom: none;
    }

    .checkbox-row input[type="checkbox"] {
      cursor: pointer;
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
    }

    .checkbox-label {
      cursor: pointer;
      flex: 1;
      font-size: 13px;
    }

    .ccu-text {
      font-size: 11px;
      color: var(--dim);
    }

    #shareCard {
      background: var(--panel);
      border: none;
      border-radius: 22px;
      overflow: hidden;
      margin-top: 20px;
      box-shadow: 0 16px 44px rgba(124, 58, 237, 0.18), 0 4px 14px rgba(236, 72, 153, 0.10);
    }

    .share-banner {
      background: var(--grad);
      padding: 30px 24px 24px;
      text-align: center;
      color: #fff;
    }

    .share-title {
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      text-align: center;
      margin: 0;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.18);
      letter-spacing: 0.01em;
    }

    .share-banner-sub {
      margin-top: 8px;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.02em;
      word-break: break-all;
    }

    .banner-link {
      color: #fff;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .banner-link:hover {
      opacity: 0.85;
    }

    .share-body {
      padding: 24px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .map-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 6px 18px rgba(36, 31, 51, 0.08);
    }

    .map-thumbnail {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: var(--panel2);
      display: block;
    }

    .map-placeholder {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: var(--panel2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      padding: 16px;
      text-align: center;
      font-size: 12px;
      color: var(--dim);
    }

    .map-info {
      padding: 14px;
    }

    .map-title {
      font-weight: 800;
      font-size: 18px;
      line-height: 1.3;
      margin-bottom: 10px;
      word-wrap: break-word;
      color: var(--text);
    }

    .map-code {
      font-family: "Consolas", monospace;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--grad);
      color: #fff;
      padding: 6px 12px;
      border-radius: 999px;
      display: inline-block;
    }

    .map-creator {
      margin-top: 8px;
      font-size: 12.5px;
      font-weight: 700;
      color: var(--accent3);
    }

    .map-link {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      color: var(--dim);
      text-decoration: none;
      word-break: break-all;
    }
    .map-link:hover {
      color: var(--accent3);
      text-decoration: underline;
    }

    .map-socials {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px dashed var(--line);
    }

    .map-social-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-top: 4px;
      font-size: 11px;
    }

    .map-social-icon {
      font-weight: 800;
      color: var(--accent3);
      flex-shrink: 0;
    }

    .map-social-row a {
      color: var(--dim);
      text-decoration: none;
      word-break: break-all;
    }
    .map-social-row a:hover {
      color: var(--accent3);
      text-decoration: underline;
    }

    .card-remove {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0, 0, 0, 0.6);
      color: var(--text);
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      padding: 0;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .card-remove:hover {
      background: rgba(0, 0, 0, 0.8);
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 20px;
      border: 2px dashed var(--line);
      border-radius: 14px;
      color: var(--dim);
      font-size: 14px;
      background: var(--panel2);
    }

    .share-subtitle {
      font-size: 12px;
      color: var(--dim);
      text-align: right;
      margin-top: 16px;
      font-weight: 600;
    }

    .no-data {
      text-align: center;
      padding: 40px 20px;
      color: var(--dim);
    }

    .loading {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--line);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .screenshot-mode .back-link,
    .screenshot-mode .controls-section,
    .screenshot-mode .manual-add,
    .screenshot-mode .checklist-section,
    .screenshot-mode .card-remove {
      display: none !important;
    }

    .screenshot-mode #shareCard {
      margin: 32px auto 0;
      max-width: 620px;
    }

    @media (max-width: 640px) {
      .wrapper {
        padding: 12px;
      }

      h1 {
        font-size: 20px;
      }

      .share-title {
        font-size: 20px;
      }

      .share-banner {
        padding: 22px 16px 18px;
      }

      .share-body {
        padding: 16px;
      }

      .screenshot-mode #shareCard {
        margin: 16px auto 0;
      }

      .card-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 12px;
      }

      button,
      .manual-add input {
        font-size: 12px;
        padding: 8px 12px;
      }

      .manual-add {
        flex-direction: column;
      }

      .manual-add input {
        min-width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <a href="index.html" class="back-link">← ダッシュボードに戻る</a>

    <h1>SNS投稿用 <span class="accent">スクショ</span></h1>
    <p class="subtitle">今日のおすすめマップをチェックして、投稿用スクリーンショットを作成します</p>

    <div class="layout">
      <div class="layout-left">
        <div class="controls-section">
          <button id="screenshotBtn">📸 スクショ用に表示を整える</button>
          <button id="editBtn" style="display: none;">✏️ 選択に戻る</button>
        </div>

        <div class="manual-add">
          <input type="text" id="codeInput" placeholder="コードを直接入力(例: 1234-5678-9012)">
          <button id="addBtn">追加</button>
        </div>

        <div id="checklistContainer" class="checklist-section"></div>
      </div>

      <div class="layout-right">
        <div id="shareCard">
          <div class="share-banner">
            <div class="share-title">🎮 今日遊んでみるクリエはこれ！</div>
            <div class="share-banner-sub">毎週22時から<a href="https://www.tiktok.com/@daisukevlad" target="_blank" rel="noopener" class="banner-link">https://www.tiktok.com/@daisukevlad</a>で配信予定</div>
          </div>
          <div class="share-body">
            <div class="card-grid" id="cardGrid"></div>
            <div class="share-subtitle">
              <span id="dateDisplay"></span> &nbsp;・&nbsp; UEFNヒットレーダー
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // HTML escape helper
    function esc(str) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      };
      return String(str).replace(/[&<>"']/g, c => map[c]);
    }

    // State
    let reportData = null;
    let thumbnailCache = {};
    let selectedCards = {};
    let allCodes = new Set();

    // Format date
    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00Z');
      return `${d.getUTCFullYear()}年${d.getUTCMonth() + 1}月${d.getUTCDate()}日`;
    }

    // Extract code from various formats
    function extractCode(input) {
      const trimmed = input.trim();
      const match = trimmed.match(/\d{4}-\d{4}-\d{4}/);
      return match ? match[0] : null;
    }

    // Fetch thumbnail
    async function fetchThumbnail(code) {
      if (thumbnailCache[code]) {
        return thumbnailCache[code];
      }

      try {
        const res = await fetch(`/api/thumbnail?code=${encodeURIComponent(code)}`);
        const data = await res.json();
        thumbnailCache[code] = data;
        return data;
      } catch (e) {
        thumbnailCache[code] = { ok: false, error: 'ネットワークエラー', code };
        return thumbnailCache[code];
      }
    }

    // Render checklist
    function renderChecklist(data) {
      const container = document.getElementById('checklistContainer');
      container.innerHTML = '';

      const seenCodes = new Set();

      data.recommendations.forEach(rec => {
        const group = document.createElement('div');
        group.className = 'genre-group';

        const heading = document.createElement('h2');
        heading.className = 'genre-heading';
        heading.textContent = rec.jp;
        group.appendChild(heading);

        const listContainer = document.createElement('div');

        rec.refs.forEach(ref => {
          if (seenCodes.has(ref.code)) return;
          seenCodes.add(ref.code);
          allCodes.add(ref.code);

          const row = document.createElement('div');
          row.className = 'checkbox-row';

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.id = `check-${ref.code}`;
          checkbox.value = ref.code;
          checkbox.addEventListener('change', (e) => handleCheckChange(e, ref));

          const label = document.createElement('label');
          label.className = 'checkbox-label';
          label.htmlFor = `check-${ref.code}`;
          label.innerHTML = esc(`${ref.title} (${ref.code})`);

          const ccu = document.createElement('span');
          ccu.className = 'ccu-text';
          ccu.textContent = `同時接続 ${ref.ccu}人`;

          row.appendChild(checkbox);
          row.appendChild(label);
          row.appendChild(ccu);
          listContainer.appendChild(row);
        });

        if (listContainer.children.length > 0) {
          group.appendChild(listContainer);
          container.appendChild(group);
        }
      });
    }

    // Handle checkbox change
    async function handleCheckChange(e, ref) {
      const code = ref.code;
      const isChecked = e.target.checked;

      if (isChecked) {
        addCardToShare(code, ref.title, ref.ccu);

        const thumb = await fetchThumbnail(code);
        updateCardAfterFetch(code, thumb);
      } else {
        removeCardFromShare(code);
      }
    }

    // Add card to share (with loading state)
    function addCardToShare(code, title, ccu) {
      selectedCards[code] = { title, ccu, loading: true };
      renderShareCards();
    }

    // Remove card from share
    function removeCardFromShare(code) {
      delete selectedCards[code];
      const checkbox = document.getElementById(`check-${code}`);
      if (checkbox) checkbox.checked = false;
      renderShareCards();
    }

    // Update card after thumbnail fetch
    function updateCardAfterFetch(code, thumbData) {
      if (thumbData.ok) {
        selectedCards[code].image = thumbData.image;
        selectedCards[code].fetchedTitle = thumbData.title;
        selectedCards[code].creator = thumbData.creator;
        selectedCards[code].islandUrl = thumbData.islandUrl;
        selectedCards[code].socials = thumbData.socials || {};
        selectedCards[code].loading = false;
      } else {
        selectedCards[code].error = thumbData.error;
        selectedCards[code].loading = false;
      }
      renderShareCards();
    }

    // Render share cards
    function renderShareCards() {
      const grid = document.getElementById('cardGrid');

      if (Object.keys(selectedCards).length === 0) {
        grid.innerHTML = '<div class="empty-state">ここにチェックしたマップが表示されます</div>';
        return;
      }

      grid.innerHTML = '';

      Object.entries(selectedCards).forEach(([code, data]) => {
        const card = document.createElement('div');
        card.className = 'map-card';
        card.id = `card-${code}`;

        const displayTitle = data.fetchedTitle || data.title;
        const socialIcons = { x: '𝕏', discord: '💬', instagram: '📷', tiktok: '🎵', youtube: '▶', twitch: '🎮' };
        const socials = data.socials || {};
        const socialsHtml = Object.keys(socialIcons).some(k => socials[k])
          ? `<div class="map-socials">${Object.entries(socialIcons).map(([k, icon]) =>
              socials[k] ? `<div class="map-social-row"><span class="map-social-icon">${icon}</span><a href="${esc(socials[k])}" target="_blank" rel="noopener">${esc(socials[k])}</a></div>` : ''
            ).join('')}</div>`
          : '';

        const metaHtml = `
          <div class="map-info">
            <div class="map-title">${esc(displayTitle)}</div>
            <span class="map-code">${esc(code)}</span>
            ${data.creator ? `<div class="map-creator">by ${esc(data.creator)}</div>` : ''}
            ${data.islandUrl ? `<a class="map-link" href="${esc(data.islandUrl)}" target="_blank" rel="noopener">${esc(data.islandUrl)}</a>` : ''}
            ${socialsHtml}
          </div>
        `;

        if (data.loading) {
          card.innerHTML = `
            <div class="map-placeholder">
              <div class="loading"></div>
              <div>読み込み中...</div>
            </div>
            ${metaHtml}
          `;
        } else if (data.image) {
          card.innerHTML = `
            <img src="${esc(data.image)}" alt="${esc(displayTitle)}" class="map-thumbnail">
            ${metaHtml}
          `;
        } else if (data.error) {
          card.innerHTML = `
            <div class="map-placeholder">
              <div style="color: var(--bad);">画像取得失敗</div>
              <div style="font-size: 11px;">${esc(data.error)}</div>
            </div>
            ${metaHtml}
          `;
        } else {
          card.innerHTML = `
            <div class="map-placeholder">${esc(data.title)}</div>
            ${metaHtml}
          `;
        }

        const removeBtn = document.createElement('button');
        removeBtn.className = 'card-remove';
        removeBtn.textContent = '×';
        removeBtn.onclick = () => removeCardFromShare(code);
        card.appendChild(removeBtn);

        grid.appendChild(card);
      });
    }

    // Handle manual add
    document.getElementById('addBtn').addEventListener('click', async () => {
      const input = document.getElementById('codeInput');
      const code = extractCode(input.value);

      if (!code) {
        alert('有効なコードを入力してください (例: 1234-5678-9012)');
        return;
      }

      if (selectedCards[code]) {
        alert('このマップは既に選択されています');
        return;
      }

      selectedCards[code] = { title: code, manuallyAdded: true, loading: true };
      renderShareCards();

      const thumb = await fetchThumbnail(code);
      updateCardAfterFetch(code, thumb);

      input.value = '';
    });

    // Handle Enter key in manual add input
    document.getElementById('codeInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('addBtn').click();
      }
    });

    // Toggle screenshot mode
    document.getElementById('screenshotBtn').addEventListener('click', () => {
      document.querySelector('.wrapper').classList.add('screenshot-mode');
      document.getElementById('screenshotBtn').style.display = 'none';
      document.getElementById('editBtn').style.display = 'inline-block';
    });

    document.getElementById('editBtn').addEventListener('click', () => {
      document.querySelector('.wrapper').classList.remove('screenshot-mode');
      document.getElementById('editBtn').style.display = 'none';
      document.getElementById('screenshotBtn').style.display = 'inline-block';
    });

    // Load report on page load
    async function loadReport() {
      try {
        const res = await fetch('/api/report');
        const data = await res.json();
        reportData = data;

        if (!data.ready) {
          document.getElementById('checklistContainer').innerHTML = '<div class="no-data">まだデータがありません</div>';
          return;
        }

        document.getElementById('dateDisplay').textContent = formatDate(data.date);
        renderChecklist(data);
      } catch (e) {
        document.getElementById('checklistContainer').innerHTML = '<div class="no-data">データ取得エラー</div>';
      }
    }

    loadReport();
  </script>
</body>
</html>
