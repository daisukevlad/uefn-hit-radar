<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SNS投稿用スクショ - UEFNヒットレーダー</title>
  <style>
    :root {
      /* このページだけSNS投稿向けの明るい配色(他ページのダークテーマとは独立) */
      --bg: #fdf4ff; --panel: #ffffff; --panel2: #f7f5fb; --line: #e8e4f3;
      --text: #241f33; --dim: #767089; --accent: #ec4899; --accent2: #f97316; --accent3: #7c3aed;
      --good: #16a34a; --bad: #e11d48; --blue: #7c3aed;
      --grad: linear-gradient(120deg, #7c3aed 0%, #ec4899 55%, #f97316 100%);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(160deg, #fff3ec 0%, #fdf2f8 45%, #eff2ff 100%);
      background-attachment: fixed;
      color: var(--text);
      font-family: "Segoe UI","Hiragino Sans","Meiryo",sans-serif;
      font-size: 14px;
    }

    .wrapper {
      max-width: 1320px;
      margin: 0 auto;
      padding: 20px;
    }

    /* スクショモードは左カラムが無くなるので画面幅いっぱいまで使う */
    .wrapper.screenshot-mode {
      max-width: none;
    }

    /* 選択(左)とプレビュー(右)を横並びにして1画面で完結させる */
    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 400px) 1fr;
      gap: 24px;
      align-items: start;
    }

    .layout-right {
      position: sticky;
      top: 20px;
    }

    .screenshot-mode .layout {
      grid-template-columns: 1fr;
    }
    .screenshot-mode .layout-left {
      display: none;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: var(--accent3);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }
    .back-link:hover {
      text-decoration: underline;
    }

    h1 {
      font-size: 26px;
      margin: 0 0 10px 0;
      color: var(--text);
    }
    h1 .accent {
      background: var(--grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: var(--accent);
    }

    .subtitle {
      font-size: 13px;
      color: var(--dim);
      margin-bottom: 20px;
    }

    .controls-section {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    button {
      background: var(--grad);
      color: #fff;
      border: 0;
      border-radius: 999px;
      padding: 11px 20px;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
      box-shadow: 0 6px 16px rgba(124, 58, 237, 0.25);
      transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    }
    button:hover {
      opacity: 0.95;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(124, 58, 237, 0.32);
    }

    #editBtn,
    #downloadBtn {
      background: #fff;
      color: var(--accent3);
      border: 2px solid var(--accent3);
      box-shadow: none;
    }

    #downloadBtn:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .manual-add {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .manual-add input {
      flex: 1;
      min-width: 200px;
      background: var(--panel);
      border: 1.5px solid var(--line);
      color: var(--text);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
    }
    .manual-add input::placeholder {
      color: var(--dim);
    }
    .manual-add input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .checklist-section {
      display: block;
    }

    .genre-group {
      margin-bottom: 20px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 10px rgba(124, 58, 237, 0.05);
    }

    .genre-heading {
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 12px 0;
      border-left: 4px solid var(--accent);
      padding-left: 10px;
      color: var(--accent3);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
    }
    .checkbox-row:last-child {
      border-bottom: none;
    }

    .checkbox-row input[type="checkbox"] {
      cursor: pointer;
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
    }

    .checkbox-label {
      cursor: pointer;
      flex: 1;
      font-size: 14px;
    }

    .ccu-text {
      font-size: 12px;
      color: var(--dim);
    }

    #shareCard {
      background: var(--panel);
      border: none;
      border-radius: 22px;
      overflow: hidden;
      margin-top: 20px;
      box-shadow: 0 16px 44px rgba(124, 58, 237, 0.18), 0 4px 14px rgba(236, 72, 153, 0.10);
    }

    .share-banner {
      background: var(--grad);
      padding: 30px 24px 24px;
      text-align: center;
      color: #fff;
    }

    .share-title {
      font-size: 42px;
      font-weight: 800;
      color: #fff;
      text-align: center;
      margin: 0;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.18);
      letter-spacing: 0.01em;
    }

    .share-banner-sub {
      margin-top: 12px;
      font-size: 20px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.95);
      letter-spacing: 0.01em;
      line-height: 1.5;
      word-break: break-word;
    }

    .banner-link {
      color: #fff;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .banner-link:hover {
      opacity: 0.85;
    }

    .share-body {
      padding: 28px;
    }

    /* カードは横幅いっぱいまで伸びて並ぶ(枚数が少なければ大きく、多ければ折り返す) */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
    }

    .screenshot-mode .card-grid {
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 22px;
    }

    .map-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 6px 18px rgba(36, 31, 51, 0.08);
    }

    .map-thumbnail {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: var(--panel2);
      display: block;
    }

    .map-placeholder {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: var(--panel2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      padding: 16px;
      text-align: center;
      font-size: 12px;
      color: var(--dim);
    }

    .map-info {
      padding: 18px;
    }

    .map-title {
      font-weight: 800;
      font-size: 26px;
      line-height: 1.3;
      margin-bottom: 14px;
      word-wrap: break-word;
      color: var(--text);
    }

    .map-code {
      font-family: "Consolas", monospace;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: var(--grad);
      color: #fff;
      padding: 8px 16px;
      border-radius: 999px;
      display: inline-block;
    }

    .map-creator {
      margin-top: 12px;
      font-size: 19px;
      font-weight: 700;
      color: var(--accent3);
    }

    .map-link {
      display: block;
      margin-top: 8px;
      font-size: 16px;
      color: var(--dim);
      text-decoration: none;
      word-break: break-all;
    }
    .map-link:hover {
      color: var(--accent3);
      text-decoration: underline;
    }

    .map-socials {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
    }

    .map-social-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 18px;
    }

    .map-social-icon {
      font-weight: 800;
      color: var(--accent3);
      flex-shrink: 0;
      font-size: 20px;
    }

    .map-social-row a {
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
      word-break: break-word;
    }
    .map-social-row a:hover {
      color: var(--accent3);
      text-decoration: underline;
    }

    .card-remove {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0, 0, 0, 0.6);
      color: var(--text);
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      padding: 0;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .card-remove:hover {
      background: rgba(0, 0, 0, 0.8);
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 20px;
      border: 2px dashed var(--line);
      border-radius: 14px;
      color: var(--dim);
      font-size: 16px;
      background: var(--panel2);
    }

    .share-subtitle {
      font-size: 16px;
      color: var(--dim);
      text-align: right;
      margin-top: 20px;
      font-weight: 600;
    }

    .no-data {
      text-align: center;
      padding: 40px 20px;
      color: var(--dim);
    }

    .loading {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--line);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .screenshot-mode .back-link,
    .screenshot-mode .controls-section,
    .screenshot-mode .manual-add,
    .screenshot-mode .checklist-section,
    .screenshot-mode .card-remove {
      display: none !important;
    }

    .screenshot-mode #shareCard {
      margin: 32px auto 0;
      width: 100%;
    }

  </style>
</head>
<body>
  <div class="wrapper">
    <a href="index.html" class="back-link">← ダッシュボードに戻る</a>

    
    <div class="layout">
      <div class="layout-left">
        <div class="controls-section">
          <button id="screenshotBtn">📸 スクショ用に表示を整える</button>
          <button id="editBtn" style="display: none;">✏️ 選択に戻る</button>
          <button id="downloadBtn">🖼️ 画像として保存</button>
        </div>

        <div class="manual-add">
          <input type="text" id="codeInput" placeholder="コードを直接入力(例: 1234-5678-9012)">
          <button id="addBtn">追加</button>
        </div>

        <div id="checklistContainer" class="checklist-section"></div>
      </div>

      <div class="layout-right">
        <div id="shareCard">
          <div class="share-banner">
            <div class="share-title">🎮 今日遊んでみるクリエはこれ！</div>
            <h1>
              <div class="share-banner-sub">毎週22時から<a href="https://www.tiktok.com/@daisukevlad" target="_blank" rel="noopener" class="banner-link">https://www.tiktok.com/@daisukevlad</a>で配信予定</div>
            </h1>
          </div>
          <div class="share-body">
            <div class="card-grid" id="cardGrid"></div>
            <div class="share-subtitle">
              <span id="dateDisplay"></span> &nbsp;・&nbsp; daisukevlad
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // HTML escape helper
    function esc(str) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      };
      return String(str).replace(/[&<>"']/g, c => map[c]);
    }

    // State
    let reportData = null;
    let thumbnailCache = {};
    let selectedCards = {};
    let allCodes = new Set();

    // サムネイル画像を同一オリジン経由に変換(canvas合成時にCORSで汚染されないようにする)
    function proxyImage(url) {
      return `/api/thumbnail-image?url=${encodeURIComponent(url)}`;
    }

    // Format date
    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00Z');
      return `${d.getUTCFullYear()}年${d.getUTCMonth() + 1}月${d.getUTCDate()}日`;
    }

    // SNSのURLから「最後の/より後ろ」のアカウント名だけを取り出す(Discordは招待コードなので@は付けない)
    function accountHandle(url, platform) {
      try {
        const u = new URL(url);
        const segs = u.pathname.split('/').filter(Boolean);
        const last = segs[segs.length - 1] || url;
        if (platform === 'discord') return last;
        return last.startsWith('@') ? last : '@' + last;
      } catch {
        return url;
      }
    }

    // ===== 画像として保存(canvas合成) =====
    function loadImageEl(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('画像の読み込みに失敗しました'));
        img.src = src;
      });
    }

    // 1文字ずつ折り返し(日本語混じりのテキストでも安全)。maxLines超過分は省略記号。
    function wrapText(ctx, text, maxWidth, maxLines) {
      const chars = [...String(text)];
      const lines = [];
      let line = '';
      for (const ch of chars) {
        const test = line + ch;
        if (line && ctx.measureText(test).width > maxWidth) {
          lines.push(line);
          line = ch;
          if (lines.length === maxLines) { line = ''; break; }
        } else {
          line = test;
        }
      }
      if (line) lines.push(line);
      if (lines.length > maxLines) lines.length = maxLines;
      if (lines.length === maxLines) {
        const joinedLen = lines.join('').length;
        if (joinedLen < chars.length) {
          let last = lines[maxLines - 1];
          while (last.length > 0 && ctx.measureText(last + '…').width > maxWidth) {
            last = last.slice(0, -1);
          }
          lines[maxLines - 1] = last + '…';
        }
      }
      return lines.length ? lines : [''];
    }

    function roundRectPath(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    const FONT = '"Segoe UI","Hiragino Sans","Meiryo",sans-serif';
    const SOCIAL_ICONS = { x: '𝕏', discord: '💬', instagram: '📷', tiktok: '🎵', youtube: '▶', twitch: '🎮' };

    async function downloadAsImage() {
      const btn = document.getElementById('downloadBtn');
      const codes = Object.keys(selectedCards);
      if (codes.length === 0) {
        alert('マップを1つ以上チェックしてください');
        return;
      }
      btn.disabled = true;
      btn.textContent = '画像を生成中...';
      try {
        const W = 1200;
        const PAD = 40;
        const GAP = 24;
        const cols = Math.min(codes.length, 3);
        const contentW = W - PAD * 2;
        const cardW = (contentW - GAP * (cols - 1)) / cols;
        const thumbH = Math.round(cardW * 9 / 16);

        const measure = document.createElement('canvas').getContext('2d');

        const titleLineH = 34;
        const codeBlockH = 54;
        const creatorH = 30;
        const socialRowH = 30;

        const cards = [];
        for (const code of codes) {
          const data = selectedCards[code];
          const displayTitle = data.fetchedTitle || data.title || code;
          let img = null;
          if (data.image) {
            try { img = await loadImageEl(proxyImage(data.image)); } catch { img = null; }
          }
          measure.font = `800 28px ${FONT}`;
          const titleLines = wrapText(measure, displayTitle, cardW - 36, 2);

          const socials = data.socials || {};
          const socialRows = Object.entries(SOCIAL_ICONS)
            .filter(([k]) => socials[k])
            .map(([k, icon]) => ({ icon, text: accountHandle(socials[k], k) }));

          cards.push({ code, titleLines, img, creator: data.creator || null, socialRows });
        }

        let maxInfoH = 0;
        for (const c of cards) {
          let h = 24 + c.titleLines.length * titleLineH + 10 + codeBlockH;
          if (c.creator) h += creatorH;
          if (c.socialRows.length) h += 18 + c.socialRows.length * socialRowH;
          h += 24;
          maxInfoH = Math.max(maxInfoH, h);
        }
        const cardH = thumbH + maxInfoH;
        const rows = Math.ceil(codes.length / cols);

        const bannerH = 200;
        const footerH = 56;
        const H = bannerH + PAD * 2 + rows * cardH + (rows - 1) * GAP + footerH;

        const canvas = document.createElement('canvas');
        canvas.width = W;
        canvas.height = H;
        const ctx = canvas.getContext('2d');

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, W, H);

        const bannerGrad = ctx.createLinearGradient(0, 0, W, 0);
        bannerGrad.addColorStop(0, '#7c3aed');
        bannerGrad.addColorStop(0.55, '#ec4899');
        bannerGrad.addColorStop(1, '#f97316');
        ctx.fillStyle = bannerGrad;
        ctx.fillRect(0, 0, W, bannerH);

        ctx.textAlign = 'center';
        ctx.fillStyle = '#ffffff';
        ctx.font = `800 40px ${FONT}`;
        ctx.fillText('🎮 今日遊んでみるクリエはこれ！', W / 2, 76);

        ctx.font = `700 22px ${FONT}`;
        ctx.fillStyle = 'rgba(255,255,255,0.95)';
        const subLines = wrapText(ctx, '毎週22時からhttps://www.tiktok.com/@daisukevladで配信予定', W - 100, 2);
        subLines.forEach((line, i) => ctx.fillText(line, W / 2, 118 + i * 30));

        ctx.textAlign = 'left';
        cards.forEach((c, i) => {
          const col = i % cols;
          const row = Math.floor(i / cols);
          const x = PAD + col * (cardW + GAP);
          const y = bannerH + PAD + row * (cardH + GAP);

          roundRectPath(ctx, x, y, cardW, cardH, 16);
          ctx.save();
          ctx.shadowColor = 'rgba(36,31,51,0.18)';
          ctx.shadowBlur = 16;
          ctx.shadowOffsetY = 6;
          ctx.fillStyle = '#ffffff';
          ctx.fill();
          ctx.restore();

          ctx.save();
          roundRectPath(ctx, x, y, cardW, thumbH, 16);
          ctx.clip();
          if (c.img) {
            const iw = c.img.naturalWidth, ih = c.img.naturalHeight;
            const targetRatio = cardW / thumbH;
            const srcRatio = iw / ih;
            let sx, sy, sw, sh;
            if (srcRatio > targetRatio) { sh = ih; sw = ih * targetRatio; sx = (iw - sw) / 2; sy = 0; }
            else { sw = iw; sh = iw / targetRatio; sx = 0; sy = (ih - sh) / 2; }
            ctx.drawImage(c.img, sx, sy, sw, sh, x, y, cardW, thumbH);
          } else {
            ctx.fillStyle = '#f7f5fb';
            ctx.fillRect(x, y, cardW, thumbH);
          }
          ctx.restore();

          let ty = y + thumbH + 24 + 22;
          ctx.fillStyle = '#241f33';
          ctx.font = `800 28px ${FONT}`;
          c.titleLines.forEach(line => { ctx.fillText(line, x + 18, ty); ty += titleLineH; });
          ty += 8;

          ctx.font = '800 22px Consolas, monospace';
          const codeW = ctx.measureText(c.code).width + 32;
          roundRectPath(ctx, x + 18, ty - 28, codeW, 40, 20);
          const codeGrad = ctx.createLinearGradient(x + 18, 0, x + 18 + codeW, 0);
          codeGrad.addColorStop(0, '#7c3aed'); codeGrad.addColorStop(0.55, '#ec4899'); codeGrad.addColorStop(1, '#f97316');
          ctx.fillStyle = codeGrad;
          ctx.fill();
          ctx.fillStyle = '#ffffff';
          ctx.fillText(c.code, x + 34, ty);
          ty += codeBlockH - 12;

          if (c.creator) {
            ctx.font = `700 20px ${FONT}`;
            ctx.fillStyle = '#7c3aed';
            ctx.fillText('by ' + c.creator, x + 18, ty);
            ty += creatorH;
          }

          if (c.socialRows.length) {
            ty += 10;
            ctx.strokeStyle = '#e8e4f3';
            ctx.beginPath();
            ctx.moveTo(x + 18, ty - 20);
            ctx.lineTo(x + cardW - 18, ty - 20);
            ctx.stroke();
            for (const s of c.socialRows) {
              ctx.font = '800 20px sans-serif';
              ctx.fillStyle = '#7c3aed';
              ctx.fillText(s.icon, x + 18, ty);
              ctx.font = `700 18px ${FONT}`;
              ctx.fillStyle = '#241f33';
              ctx.fillText(s.text, x + 48, ty);
              ty += socialRowH;
            }
          }
        });

        ctx.textAlign = 'right';
        ctx.font = `600 18px ${FONT}`;
        ctx.fillStyle = '#767089';
        const dateText = document.getElementById('dateDisplay').textContent || '';
        ctx.fillText(`${dateText} ・ UEFNヒットレーダー`, W - PAD, H - 22);

        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `uefn-hitradar-${(dateText || 'share').replace(/[^\d]/g, '') || Date.now()}.png`;
        a.click();
        URL.revokeObjectURL(a.href);
      } catch (e) {
        alert('画像の生成に失敗しました: ' + (e && e.message ? e.message : e));
      } finally {
        btn.disabled = false;
        btn.textContent = '🖼️ 画像として保存';
      }
    }

    // Extract code from various formats
    function extractCode(input) {
      const trimmed = input.trim();
      const match = trimmed.match(/\d{4}-\d{4}-\d{4}/);
      return match ? match[0] : null;
    }

    // Fetch thumbnail
    async function fetchThumbnail(code) {
      if (thumbnailCache[code]) {
        return thumbnailCache[code];
      }

      try {
        const res = await fetch(`/api/thumbnail?code=${encodeURIComponent(code)}`);
        const data = await res.json();
        thumbnailCache[code] = data;
        return data;
      } catch (e) {
        thumbnailCache[code] = { ok: false, error: 'ネットワークエラー', code };
        return thumbnailCache[code];
      }
    }

    // Render checklist
    function renderChecklist(data) {
      const container = document.getElementById('checklistContainer');
      container.innerHTML = '';

      const seenCodes = new Set();

      data.recommendations.forEach(rec => {
        const group = document.createElement('div');
        group.className = 'genre-group';

        const heading = document.createElement('h2');
        heading.className = 'genre-heading';
        heading.textContent = rec.jp;
        group.appendChild(heading);

        const listContainer = document.createElement('div');

        rec.refs.forEach(ref => {
          if (seenCodes.has(ref.code)) return;
          seenCodes.add(ref.code);
          allCodes.add(ref.code);

          const row = document.createElement('div');
          row.className = 'checkbox-row';

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.id = `check-${ref.code}`;
          checkbox.value = ref.code;
          checkbox.addEventListener('change', (e) => handleCheckChange(e, ref));

          const label = document.createElement('label');
          label.className = 'checkbox-label';
          label.htmlFor = `check-${ref.code}`;
          label.innerHTML = esc(`${ref.title} (${ref.code})`);

          const ccu = document.createElement('span');
          ccu.className = 'ccu-text';
          ccu.textContent = `同時接続 ${ref.ccu}人`;

          row.appendChild(checkbox);
          row.appendChild(label);
          row.appendChild(ccu);
          listContainer.appendChild(row);
        });

        if (listContainer.children.length > 0) {
          group.appendChild(listContainer);
          container.appendChild(group);
        }
      });
    }

    // Handle checkbox change
    async function handleCheckChange(e, ref) {
      const code = ref.code;
      const isChecked = e.target.checked;

      if (isChecked) {
        addCardToShare(code, ref.title, ref.ccu);

        const thumb = await fetchThumbnail(code);
        updateCardAfterFetch(code, thumb);
      } else {
        removeCardFromShare(code);
      }
    }

    // Add card to share (with loading state)
    function addCardToShare(code, title, ccu) {
      selectedCards[code] = { title, ccu, loading: true };
      renderShareCards();
    }

    // Remove card from share
    function removeCardFromShare(code) {
      delete selectedCards[code];
      const checkbox = document.getElementById(`check-${code}`);
      if (checkbox) checkbox.checked = false;
      renderShareCards();
    }

    // Update card after thumbnail fetch
    function updateCardAfterFetch(code, thumbData) {
      if (thumbData.ok) {
        selectedCards[code].image = thumbData.image;
        selectedCards[code].fetchedTitle = thumbData.title;
        selectedCards[code].creator = thumbData.creator;
        selectedCards[code].islandUrl = thumbData.islandUrl;
        selectedCards[code].socials = thumbData.socials || {};
        selectedCards[code].loading = false;
      } else {
        selectedCards[code].error = thumbData.error;
        selectedCards[code].loading = false;
      }
      renderShareCards();
    }

    // Render share cards
    function renderShareCards() {
      const grid = document.getElementById('cardGrid');

      if (Object.keys(selectedCards).length === 0) {
        grid.innerHTML = '<div class="empty-state">ここにチェックしたマップが表示されます</div>';
        return;
      }

      grid.innerHTML = '';

      Object.entries(selectedCards).forEach(([code, data]) => {
        const card = document.createElement('div');
        card.className = 'map-card';
        card.id = `card-${code}`;

        const displayTitle = data.fetchedTitle || data.title;
        const socialIcons = { x: '𝕏', discord: '💬', instagram: '📷', tiktok: '🎵', youtube: '▶', twitch: '🎮' };
        const socials = data.socials || {};
        const socialsHtml = Object.keys(socialIcons).some(k => socials[k])
          ? `<div class="map-socials">${Object.entries(socialIcons).map(([k, icon]) =>
              socials[k] ? `<div class="map-social-row"><span class="map-social-icon">${icon}</span><a href="${esc(socials[k])}" target="_blank" rel="noopener">${esc(accountHandle(socials[k], k))}</a></div>` : ''
            ).join('')}</div>`
          : '';

        const metaHtml = `
          <div class="map-info">
            <div class="map-title">${esc(displayTitle)}</div>
            <span class="map-code">${esc(code)}</span>
            ${data.creator ? `<div class="map-creator">by ${esc(data.creator)}</div>` : ''}
            ${data.islandUrl ? `<a class="map-link" href="${esc(data.islandUrl)}" target="_blank" rel="noopener">${esc(data.islandUrl)}</a>` : ''}
            ${socialsHtml}
          </div>
        `;

        if (data.loading) {
          card.innerHTML = `
            <div class="map-placeholder">
              <div class="loading"></div>
              <div>読み込み中...</div>
            </div>
            ${metaHtml}
          `;
        } else if (data.image) {
          card.innerHTML = `
            <img src="${esc(proxyImage(data.image))}" alt="${esc(displayTitle)}" class="map-thumbnail" crossorigin="anonymous">
            ${metaHtml}
          `;
        } else if (data.error) {
          card.innerHTML = `
            <div class="map-placeholder">
              <div style="color: var(--bad);">画像取得失敗</div>
              <div style="font-size: 11px;">${esc(data.error)}</div>
            </div>
            ${metaHtml}
          `;
        } else {
          card.innerHTML = `
            <div class="map-placeholder">${esc(data.title)}</div>
            ${metaHtml}
          `;
        }

        const removeBtn = document.createElement('button');
        removeBtn.className = 'card-remove';
        removeBtn.textContent = '×';
        removeBtn.onclick = () => removeCardFromShare(code);
        card.appendChild(removeBtn);

        grid.appendChild(card);
      });
    }

    // Handle manual add
    document.getElementById('addBtn').addEventListener('click', async () => {
      const input = document.getElementById('codeInput');
      const code = extractCode(input.value);

      if (!code) {
        alert('有効なコードを入力してください (例: 1234-5678-9012)');
        return;
      }

      if (selectedCards[code]) {
        alert('このマップは既に選択されています');
        return;
      }

      selectedCards[code] = { title: code, manuallyAdded: true, loading: true };
      renderShareCards();

      const thumb = await fetchThumbnail(code);
      updateCardAfterFetch(code, thumb);

      input.value = '';
    });

    // Handle Enter key in manual add input
    document.getElementById('codeInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('addBtn').click();
      }
    });

    document.getElementById('downloadBtn').addEventListener('click', downloadAsImage);

    // Toggle screenshot mode
    document.getElementById('screenshotBtn').addEventListener('click', () => {
      document.querySelector('.wrapper').classList.add('screenshot-mode');
      document.getElementById('screenshotBtn').style.display = 'none';
      document.getElementById('editBtn').style.display = 'inline-block';
    });

    document.getElementById('editBtn').addEventListener('click', () => {
      document.querySelector('.wrapper').classList.remove('screenshot-mode');
      document.getElementById('editBtn').style.display = 'none';
      document.getElementById('screenshotBtn').style.display = 'inline-block';
    });

    // Load report on page load
    async function loadReport() {
      try {
        const res = await fetch('/api/report');
        const data = await res.json();
        reportData = data;

        if (!data.ready) {
          document.getElementById('checklistContainer').innerHTML = '<div class="no-data">まだデータがありません</div>';
          return;
        }

        document.getElementById('dateDisplay').textContent = formatDate(data.date);
        renderChecklist(data);
      } catch (e) {
        document.getElementById('checklistContainer').innerHTML = '<div class="no-data">データ取得エラー</div>';
      }
    }

    loadReport();
  </script>
</body>
</html>
